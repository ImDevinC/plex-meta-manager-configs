name: Release and Publish Docker Image

on:
  push:
    branches: [main]
    paths-ignore:
      - "config/**"
      - .github/**
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.version.outputs.version }}
      updated: ${{ steps.version.outputs.updated }}
    steps:
      - name: Checkout code
        uses: https://code.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: version
        uses: https://github.com/benjaminschmidt/simple-semantic-release@1.3.3
        with:
          create-release: true
          token: ${{ forge.token }}

  docker:
    needs: release
    if: needs.release.outputs.updated == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: https://code.forgejo.org/actions/checkout@v4

      - name: Log in to Docker Hub
        uses: https://code.forgejo.org/docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          IMAGE="imdevinc/pmm"
          TAG="${{ needs.release.outputs.new_tag }}"
          docker build -t "${IMAGE}:${TAG}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:latest"
