name: Release and Publish Docker Image

on:
  push:
    branches: [main]
    paths-ignore:
      - "config/**"
      - .github/**
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
      changelog: ${{ steps.tag_version.outputs.changelog }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main
          # Semantic commit prefixes for version bumping:
          # feat: -> minor version bump (e.g., 1.0.0 -> 1.1.0)
          # fix: -> patch version bump (e.g., 1.0.0 -> 1.0.1)
          # BREAKING CHANGE: -> major version bump (e.g., 1.0.0 -> 2.0.0)
          tag_prefix: v

  docker:
    needs: release
    if: needs.release.outputs.new_tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/imdevinc/pmm
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.new_tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.new_tag }}
            type=semver,pattern={{major}},value=${{ needs.release.outputs.new_tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.new_tag }}
          body: |
            ## Changes
            ${{ needs.release.outputs.changelog }}

            ## Docker Images
            Pull the image:
            ```bash
            docker pull ghcr.io/imdevinc/pmm:${{ needs.release.outputs.new_tag }}
            docker pull ghcr.io/imdevinc/pmm:latest
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
