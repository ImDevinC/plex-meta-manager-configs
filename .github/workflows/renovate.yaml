name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Renovate
        uses: renovatebot/github-action@v46.1.7
        with:
          token: ${{ secrets.REPO_PAT }}
          configurationFile: .github/renovate.json
        env:
          LOG_LEVEL: debug
