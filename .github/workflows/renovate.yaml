name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"
  pull_request_target:
    types: [edited]
    branches:
      - "main"

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Renovate
        uses: renovatebot/github-action@v46.1.20
        with:
          token: ${{ secrets.REPO_PAT }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          LOG_LEVEL: debug
