name: Comment Action

on:
  issue_comment:

jobs:
  issue_commented:
    name: Issue Comment
    if: ${{ !github.event.issue.pull_request && github.event.comment.user.login == 'ImDevinC' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v7
      - name: Install yq
        run: sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 && sudo chmod a+x /usr/local/bin/yq
      - name: Add Movie
        run: ./add_movie.sh "${{ github.event.issue.title }}" "${{ github.event.comment.body }}"
      - name: Create Pull Request
        id: create_pr
        uses: https://github.com/maxking/forgejo-create-pr@main
        with:
          pr-title: "[CI] Added ${{ github.event.issue.title}}"
          commit-message: "[CI] Added ${{ github.event.issue.title}}"
          pr-branch: "feat-auto-${{ github.event.comment.id }}"
          base: main
          pr-body: "Fixes #${{ github.event.issue.number }}"
          token: ${{ secrets.REPO_PAT }}
          pr-automerge: true
