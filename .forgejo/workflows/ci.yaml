name: Release and Publish Docker Image

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: https://code.forgejo.org/actions/checkout@v7

      - name: Log in to Docker Hub
        uses: https://code.forgejo.org/docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up QEMU
        uses: https://code.forgejo.org/docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: https://code.forgejo.org/docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: https://code.forgejo.org/docker/build-push-action@v7
        with:
          push: true
          tags: imdevinc/pmm:latest,imdevinc/pmm:${{ github.ref_name }}
